<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEURONA — Filtre de Consciència Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:           #f0f1f5;
      --surface:      #ffffff;
      --surface-2:    #f7f8fb;
      --ink:          #0d1220;
      --ink-2:        #3d4560;
      --ink-3:        #8892aa;
      --accent-a:     #3a6cf4;
      --accent-b:     #7c3af4;
      --card-data:    #eef3ff;
      --card-empath:  #eef9f4;
      --card-pedag:   #fdf3e8;
      --border-data:  #c5d4fb;
      --border-empath:#b5e8ce;
      --border-pedag: #f5d9a8;
      --dot-data:     #3a6cf4;
      --dot-empath:   #22c27a;
      --dot-pedag:    #f5a623;
      --radius:       18px;
      --radius-sm:    10px;
      --shadow:       0 4px 24px rgba(13,18,32,.08);
      --shadow-card:  0 2px 12px rgba(13,18,32,.06);
      --transition:   .25s cubic-bezier(.4,0,.2,1);
    }

    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 0 0 40px;
    }

    /* ─── SHELL ──────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(240,241,245,.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(13,18,32,.07);
    }

    .header__inner {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(122,58,244,.3);
      animation: pulse-logo 3s ease-in-out infinite;
    }

    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 4px 14px rgba(122,58,244,.3); }
      50%       { box-shadow: 0 4px 22px rgba(122,58,244,.55); }
    }

    .header__text {}

    .title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: .08em;
      background: linear-gradient(100deg, var(--accent-a), var(--accent-b));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .subtitle {
      font-size: 11.5px;
      font-weight: 400;
      color: var(--ink-3);
      letter-spacing: .04em;
      margin-top: 3px;
      text-transform: uppercase;
    }

    /* ─── MAIN CONTENT ───────────────────────────────────── */
    .main {
      padding: 24px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── LABEL / HINT ───────────────────────────────────── */
    .label {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: var(--ink-2);
      letter-spacing: .03em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label .badge {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 11px;
      background: var(--surface);
      color: var(--ink-3);
      border: 1px solid rgba(13,18,32,.1);
      border-radius: 20px;
      padding: 1px 8px;
      letter-spacing: 0;
    }

    /* ─── TEXTAREA ───────────────────────────────────────── */
    .input-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      border-radius: var(--radius);
      border: 1.5px solid rgba(13,18,32,.1);
      background: var(--surface);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.65;
      padding: 18px 18px 44px;
      resize: none;
      outline: none;
      box-shadow: var(--shadow-card);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    textarea::placeholder { color: var(--ink-3); font-style: italic; }

    textarea:focus {
      border-color: var(--accent-a);
      box-shadow: 0 0 0 3px rgba(58,108,244,.12), var(--shadow-card);
    }

    .char-count {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-size: 11.5px;
      color: var(--ink-3);
      pointer-events: none;
    }

    /* ─── BUTTON ─────────────────────────────────────────── */
    .btn-analyze {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(110deg, var(--accent-a) 0%, var(--accent-b) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 20px rgba(58,108,244,.35);
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn-analyze::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(255,255,255,.15), transparent);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .btn-analyze:hover::after { opacity: 1; }
    .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(58,108,244,.45); }
    .btn-analyze:active { transform: translateY(0); box-shadow: 0 4px 12px rgba(58,108,244,.3); }
    .btn-analyze:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-icon {
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    /* ─── LOADING SPINNER ────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-analyze.loading .btn-label,
    .btn-analyze.loading .btn-icon { display: none; }
    .btn-analyze.loading .spinner { display: block; }

    /* ─── DIVIDER ─────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink-3);
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(13,18,32,.1);
    }

    /* ─── RESULTS SECTION ────────────────────────────────── */
    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      max-height: 0;
      overflow: hidden;
      transition: opacity .4s ease, transform .4s ease, max-height .5s ease;
    }

    .results.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      max-height: 1200px;
    }

    /* ─── CARD ───────────────────────────────────────────── */
    .card {
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-card);
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
      animation: card-in .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .12s; }
    .card:nth-child(3) { animation-delay: .19s; }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(12px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card--data   { background: var(--card-data);   border-color: var(--border-data); }
    .card--empath { background: var(--card-empath); border-color: var(--border-empath); }
    .card--pedag  { background: var(--card-pedag);  border-color: var(--border-pedag); }

    /* decorative glow blob */
    .card::before {
      content: '';
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      top: -20px;
      right: -20px;
      opacity: .18;
      filter: blur(24px);
    }
    .card--data::before   { background: var(--accent-a); }
    .card--empath::before { background: var(--dot-empath); }
    .card--pedag::before  { background: var(--dot-pedag); }

    .card__header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .card__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card--data   .card__dot { background: var(--dot-data); }
    .card--empath .card__dot { background: var(--dot-empath); }
    .card--pedag  .card__dot { background: var(--dot-pedag); }

    .card__icon {
      font-size: 16px;
      line-height: 1;
    }

    .card__title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12.5px;
      color: var(--ink-2);
      letter-spacing: .05em;
      text-transform: uppercase;
      flex: 1;
    }

    .card__body {
      font-size: 14.5px;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.7;
    }

    .card__body .skeleton {
      background: linear-gradient(90deg, rgba(13,18,32,.07) 25%, rgba(13,18,32,.13) 50%, rgba(13,18,32,.07) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 13px;
      margin-bottom: 8px;
    }
    .card__body .skeleton:last-child { width: 65%; margin-bottom: 0; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── FOOTER ─────────────────────────────────────────── */
    .footer {
      margin-top: 32px;
      padding: 0 20px;
      text-align: center;
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: .03em;
      line-height: 1.7;
    }

    .footer a {
      color: var(--accent-a);
      text-decoration: none;
    }

    /* ─── COPY BUTTON ────────────────────────────────────── */
    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 14px;
      padding: 6px 12px;
      border: 1px solid rgba(13,18,32,.15);
      border-radius: 20px;
      background: var(--surface);
      color: var(--ink-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-copy:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn-copy.copied { background: #22c27a; color: #fff; border-color: #22c27a; }
    .copy-icon { font-size: 13px; }

    /* ─── TEMA BADGE ─────────────────────────────────────── */
    .tema-badge {
      font-size: 10.5px;
      font-weight: 500;
      background: var(--surface);
      color: var(--accent-a);
      border: 1px solid var(--border-data);
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
      animation: fade-in .3s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: scale(.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── DESKTOP CHROME ─────────────────────────────────── */
    @media (min-width: 520px) {
      body { padding: 32px 16px 60px; align-items: flex-start; }
      .app {
        border-radius: 28px;
        box-shadow: 0 20px 60px rgba(13,18,32,.12), 0 4px 16px rgba(13,18,32,.06);
        overflow: hidden;
        background: var(--bg);
      }
      .header { border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <div class="logo">🧠</div>
      <div class="header__text">
        <div class="title">NEURONA</div>
        <div class="subtitle">Filtre de Consciència Digital</div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- INPUT -->
    <div class="input-block">
      <div class="label">
        Missatge a analitzar
        <span class="badge">IA · Privat</span>
      </div>
      <div class="textarea-wrap">
        <textarea
          id="msgInput"
          placeholder="Enganxa aquí el missatge sospitós..."
          maxlength="3000"
          aria-label="Missatge a analitzar"
          oninput="updateCount(this)"
        ></textarea>
        <span class="char-count" id="charCount">0 / 3000</span>
      </div>
    </div>

    <!-- CTA -->
    <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">
      <span class="btn-icon">⚡</span>
      <span class="btn-label">Analitzar Missatge</span>
      <div class="spinner"></div>
    </button>

    <!-- DIVIDER -->
    <div class="divider" id="divider" style="display:none">Anàlisi</div>

    <!-- RESULTS -->
    <div class="results" id="results" aria-live="polite">

      <!-- Card 1: Dades -->
      <div class="card card--data">
        <div class="card__header">
          <div class="card__dot"></div>
          <span class="card__icon">📊</span>
          <div class="card__title">Resposta Basada en Dades</div>
        </div>
        <div class="card__body" id="body-data">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <!-- Card 2: Empàtica -->
      <div class="card card--empath">
        <div class="card__header">
          <div class="card__dot"></div>
          <span class="card__icon">💬</span>
          <div class="card__title">Resposta Empàtica</div>
        </div>
        <div class="card__body" id="body-empath">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <!-- Card 3: Pedagògica -->
      <div class="card card--pedag">
        <div class="card__header">
          <div class="card__dot"></div>
          <span class="card__icon">🎓</span>
          <div class="card__title">Resposta Pedagògica</div>
        </div>
        <div class="card__body" id="body-pedag">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

    </div>
    <!-- /results -->

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    NEURONA · Eina de detecció de desinformació<br>
    Anàlisi local · Cap dada s'envia al servidor
  </footer>

</div>

<script>
  /* ════════════════════════════════════════════════════
     BASE DE DADES DE TEMES
  ════════════════════════════════════════════════════ */
  const baseDeDades = {

    immigració: {
      paraules: ['immigració','immigrant','immigrants','immigrat','immigrats','refugiat','refugiats','migrant','migrants','fronteres','frontera','deportació','il·legal','il·legals','migració','asil'],
      data: `Els estudis demogràfics mostren que la immigració neta té un impacte <strong>positiu en el PIB</strong> a llarg termini (FMI, 2023). Les narratives que associen immigració amb criminalitat no troben suport en dades: les taxes delictives no correlacionen amb nivells d'immigració. Fonts com Eurostat i l'OIM desmunten molts dels arguments numèrics usats en bulos sobre aquest tema.`,
      empath: `Entenc que els missatges sobre immigració sovint generen inseguretat o preocupació. Aquestes emocions són legítimes. El problema és que la por és fàcilment explotable per a la desinformació. Quan un missatge et fa sentir amenaçat de manera molt intensa i immediata, és el moment de fer una pausa i buscar context real abans de compartir-lo.`,
      pedag: `Els bulos sobre immigració solen usar l'estratègia de la <em>«generalització falsa»</em>: prenen un cas aïllat i el presenten com a norma. Per combatre-ho: (1) Busca la font original de les dades. (2) Comprova si organitzacions com ACNUR o Eurostat contradiuen l'afirmació. (3) Aplica el principi: "Un cas no és una estadística".`
    },

    vacunes: {
      paraules: ['vacuna','vacunes','vacunat','vacunació','vaccine','pfizer','moderna','astrazeneca','covid','sars','mrna','immunització','antivacuna','efectes secundaris'],
      data: `L'eficàcia i seguretat de les vacunes està avalada per <strong>dècades d'evidència científica revisada per parells</strong>. L'OMS i el CDC monitoritzen contínuament efectes adversos. L'estudi fraudulent que suposadament vinculava vacunes amb autisme va ser retirat i el seu autor, inhabilitat. La taxa de greus efectes adversos és estadísticament inferior als riscos de les malalties que prevenen.`,
      empath: `El dubte sobre les vacunes sovint neix d'una preocupació molt humana: voler protegir la família. Ningú que es pregunti sobre seguretat mèdica és "ignorant". El problema apareix quan fonts no fiables es presenten amb l'aparença de ciència oficial. Pots expressar dubtes al teu metge: és el millor canal per a preguntes reals sobre salut.`,
      pedag: `Per avaluar informació sobre vacunes: (1) Comprova si la font és una revista científica amb revisió per parells (PubMed, Lancet, NEJM). (2) Desconfia de fonts que usen termes com "el que no et diuen" o "veritat ocultada". (3) Consulta el <em>Vaccine Safety Net</em> de l'OMS. (4) Recorda: correlació no implica causalitat.`
    },

    clima: {
      paraules: ['clima','canvi climàtic','escalfament','CO2','emissions','carboni','temperatura','efecte hivernacle','glacier','gelera','inundació','sequera','renovables','fòssil','petroli','paris','ipcc'],
      data: `El <strong>97% dels científics climàtics</strong> coincideixen: l'escalfament global actual és d'origen humà (NASA, IPCC AR6, 2021). La temperatura global ha pujat ~1,1°C des de l'era preindustrial. Les dades de CO₂ atmosfèric (ara a 420 ppm) no han estat tan altes en 800.000 anys, segons nuclis de gel antàrtics. Els bulos solen descontextualitzar dades locals per negar tendències globals.`,
      empath: `L'ansietat climàtica és real i comprensible. Alhora, la desinformació sobre el clima causa bloqueig: si tot sembla incert o contradictori, és difícil actuar. Quan un missatge et genera confusió sobre si el canvi climàtic existeix, recorda que el dubte sistemàtic és precisament el que algunes indústries han finançat durant dècades per aturar l'acció.`,
      pedag: `Estratègia clàssica de negacionisme climàtic: el <em>«fals debat»</em>, fent semblar que hi ha una controvèrsia científica real quan no n'hi ha. Per detectar-ho: (1) Mira qui finança l'estudi. (2) Comprova si l'autor és expert en climatologia o en una altra àrea. (3) Consulta directament el portal de l'IPCC o NASA Climate. (4) "El temps local" ≠ "clima global".`
    },

    economia: {
      paraules: ['economia','inflació','preu','preus','deute','deute públic','pib','atur','feina','treball','impost','impostos','pensió','pensions','euro','dòlar','borsa','crisi','recessió','mercat','pobresa','riquesa'],
      data: `Les afirmacions econòmiques en bulos solen usar <strong>dades reals fora de context temporal o comparatiu</strong>. Per exemple, el deute públic expressat en valor absolut omete la relació deute/PIB i el context internacional. Fonts fiables: Eurostat, Banc d'Espanya, FMI, OCDE. Recorda que un gràfic sense eixos clarament etiquetats és una senyera vermella.`,
      empath: `La incertesa econòmica genera angoixa real, i els missatges que semblen explicar "qui té la culpa" poden ser reconfortants. Però sovint aquestes explicacions simples oculten la complexitat real i assenyalen bocs expiatoris. Prendre decisions importants (polítiques, financeres) basant-se en desinformació econòmica pot tenir conseqüències concretes per a tu i la teva família.`,
      pedag: `Per analitzar afirmacions econòmiques: (1) Demana la font de les dades i l'any. (2) Compara amb països similars, no aïlladament. (3) Desconfia de correlacions presentades com a causalitats ("els immigrants baixen els salaris" ignora desenes de variables). (4) El recurs <em>Our World in Data</em> (ourworldindata.org) ofereix dades contextualitzades i visualitzades honestament.`
    },

    gènere: {
      paraules: ['gènere','feminisme','feminista','igualtat','LGTBI','LGTBIQ','trans','transgènere','avortament','violència de gènere','masclisme','patriarcat','ideologia de gènere','identitat sexual','orientació','homosexual','bisexual'],
      data: `La <strong>bretxa salarial de gènere és documentada estadísticament</strong> per Eurostat (en mitjana, les dones cobren un 13% menys per hora a la UE). La violència de gènere és reconeguda com a problema de salut pública per l'OMS. El terme "ideologia de gènere" no té base científica; és una construcció política. La investigació en biologia, psicologia i sociologia dona suport a la diversitat d'identitats de gènere.`,
      empath: `Els debats sobre gènere sovint venen carregats d'emocions molt fortes, en totes direccions. Si has rebut un missatge que et genera confusió o indignació sobre aquest tema, és bo recordar que les persones afectades per aquestes realitats (dones, persones LGTBIQ+) no són abstraccions: les dades i les polítiques sobre gènere afecten vides reals. Considera com et sentiries si fossis la persona de qui es parla.`,
      pedag: `Els bulos sobre gènere solen usar la tàctica de la <em>«fal·làcia del pendent relliscós»</em>: "si acceptem X, llavors inevitablement passarà Y" sense cap prova. Per identificar-ho: (1) Busca estudis revisats per parells sobre la premissa concreta. (2) Distingeix entre opinió moral i evidència empírica. (3) Consulta fonts com l'OMS, ACNUR o Amnistia Internacional en lloc de llocs activistes anònims.`
    }
  };

  /* ════════════════════════════════════════════════════
     RESPOSTA GENÈRICA (fallback)
  ════════════════════════════════════════════════════ */
  const respostaGenerica = {
    data: `No he detectat un tema específic, però el missatge presenta patrons comuns de desinformació: <strong>manca de fonts verificables</strong>, ús de llenguatge d'urgència («comparteix ara», «t'ho ocultaven») i afirmacions absolutistes sense matisos. Abans de compartir qualsevol contingut, verifica'l a Maldita.es, Newtral o AFP Factual.`,
    empath: `Entenc que rebre missatges alarmants o sorprenents genera una reacció emocional forta, i és natural voler compartir-los per avisar als teus éssers estimats. Precisament aquesta urgència emocional és el que exploten els creadors de bulos. Fes una pausa de 5 minuts i pregunta't: "Per què em fa sentir exactament això? Qui se'n beneficia si ho comparteixo?"`,
    pedag: `Aplica el mètode <strong>SIFT</strong> a qualsevol missatge sospitós: <em>Stop</em> — para i no comparteixis immediatament. <em>Investigate</em> — investiga la font original. <em>Find better coverage</em> — busca si altres fonts fiables ho confirmen. <em>Trace claims</em> — rastreja l'afirmació fins al seu origen. Si no trobes la font original, això ja és una senyera vermella important.`
  };

  /* ════════════════════════════════════════════════════
     MOTOR D'ANÀLISI
  ════════════════════════════════════════════════════ */
  function detectarTema(text) {
    const textNorm = text.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // treure accents per a la cerca

    for (const [tema, dades] of Object.entries(baseDeDades)) {
      for (const paraula of dades.paraules) {
        const paraulaNorm = paraula.toLowerCase()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        if (textNorm.includes(paraulaNorm)) {
          return { tema, dades };
        }
      }
    }
    return null; // cap tema trobat → fallback
  }

  /* ════════════════════════════════════════════════════
     UI: COMPTADOR DE CARÀCTERS
  ════════════════════════════════════════════════════ */
  function updateCount(el) {
    document.getElementById('charCount').textContent =
      el.value.length + ' / ' + el.maxLength;
  }

  /* ════════════════════════════════════════════════════
     UI: ANALITZAR
  ════════════════════════════════════════════════════ */
  async function analyze() {
    const input = document.getElementById('msgInput');
    const btn   = document.getElementById('btnAnalyze');
    const res   = document.getElementById('results');
    const div   = document.getElementById('divider');

    if (!input.value.trim()) {
      input.focus();
      input.style.borderColor = '#f43a3a';
      setTimeout(() => input.style.borderColor = '', 1400);
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');

    setSkeletons();
    div.style.display = 'flex';
    res.classList.add('visible');

    await delay(1600);

    const resultat = detectarTema(input.value.trim());
    if (resultat) {
      const { tema, dades } = resultat;
      omplirResultats(dades.data, dades.empath, dades.pedag, tema);
    } else {
      omplirResultats(respostaGenerica.data, respostaGenerica.empath, respostaGenerica.pedag, null);
    }

    btn.disabled = false;
    btn.classList.remove('loading');
  }

  /* ════════════════════════════════════════════════════
     UI: HELPERS
  ════════════════════════════════════════════════════ */
  function setSkeletons() {
    ['data','empath','pedag'].forEach(id => {
      document.getElementById('body-' + id).innerHTML =
        '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    });
    // Amaga badges de tema si existien
    document.querySelectorAll('.tema-badge').forEach(b => b.remove());
  }

  function omplirResultats(txtData, txtEmpath, txtPedag, tema) {
    document.getElementById('body-data').innerHTML   = txtData   + copyBtn('data');
    document.getElementById('body-empath').innerHTML = txtEmpath + copyBtn('empath');
    document.getElementById('body-pedag').innerHTML  = txtPedag  + copyBtn('pedag');

    // Badge de tema detectat al divider
    const div = document.getElementById('divider');
    const badgeExistent = div.querySelector('.tema-badge');
    if (badgeExistent) badgeExistent.remove();
    if (tema) {
      const badge = document.createElement('span');
      badge.className = 'tema-badge';
      badge.textContent = '🏷 ' + tema.charAt(0).toUpperCase() + tema.slice(1);
      div.appendChild(badge);
    }
  }

  function copyBtn(id) {
    return `<button class="btn-copy" onclick="copiarText('body-${id}', this)" title="Copiar resposta">
      <span class="copy-icon">⧉</span><span class="copy-label">Copiar</span>
    </button>`;
  }

  async function copiarText(bodyId, btn) {
    const el = document.getElementById(bodyId);
    // Agafa text sense el botó de copiar
    const clone = el.cloneNode(true);
    clone.querySelectorAll('.btn-copy').forEach(b => b.remove());
    const text = clone.innerText || clone.textContent;

    try {
      await navigator.clipboard.writeText(text.trim());
      btn.classList.add('copied');
      btn.querySelector('.copy-label').textContent = 'Copiat!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.querySelector('.copy-label').textContent = 'Copiar';
      }, 2000);
    } catch {
      // Fallback per a entorns sense clipboard API
      const ta = document.createElement('textarea');
      ta.value = text.trim();
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.querySelector('.copy-label').textContent = 'Copiat!';
      setTimeout(() => btn.querySelector('.copy-label').textContent = 'Copiar', 2000);
    }
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  /* ── Drecera de teclat ───────────────────────────── */
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') analyze();
  });
</script>
